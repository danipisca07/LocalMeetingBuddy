<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeetingTwin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <h1>MeetingTwin</h1>
      <div id="connection-status" class="connection-indicator disconnected">
        <span class="indicator-dot"></span>
        <span class="indicator-text">Disconnesso</span>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab-button active" data-tab="tab-live">Meeting Live</button>
      <button class="tab-button" data-tab="tab-batch">Trascrizione File</button>
      <button class="tab-button" data-tab="tab-config">Configurazione</button>
      <button class="tab-button" data-tab="tab-history">Storico</button>
    </nav>

    <!-- Tab Content -->
    <main class="tab-content">
      <!-- Meeting Live Tab -->
      <section id="tab-live" class="tab-pane active">
        <div class="live-meeting">
          <!-- Control Panel -->
          <div class="live-control-panel">
            <div class="status-row">
              <div class="status-badge" id="meeting-status-badge">
                <span class="status-indicator" id="status-indicator"></span>
                <span class="status-text" id="status-text">Inattivo</span>
              </div>
              <div class="status-message" id="status-message"></div>
              <div class="control-buttons">
                <button id="btn-start-meeting" class="btn btn-primary">Avvia</button>
                <button id="btn-stop-meeting" class="btn btn-danger" disabled>Termina</button>
              </div>
            </div>
          </div>

          <!-- Two-panel layout -->
          <div class="live-panels">
            <!-- Transcript Panel -->
            <div class="panel transcript-panel">
              <div class="panel-header">
                <h3>Trascrizione</h3>
              </div>
              <div class="panel-body">
                <div id="transcript-display" class="transcript-display"></div>
              </div>
            </div>

            <!-- AI Chat Panel -->
            <div class="panel chat-panel">
              <div class="panel-header">
                <h3>Chat AI</h3>
              </div>
              <div class="panel-body">
                <div id="chat-display" class="chat-display"></div>
                <div class="chat-input-area">
                  <input
                    type="text"
                    id="chat-input"
                    class="chat-input"
                    placeholder="Fai una domanda…"
                    disabled
                  >
                  <button id="btn-send-chat" class="btn btn-primary" disabled>Invia</button>
                </div>
                <div id="chat-thinking" class="chat-thinking" style="display: none;">
                  L'agente sta pensando…
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Batch Transcription Tab -->
      <section id="tab-batch" class="tab-pane">
        <div class="placeholder">
          <p>Disponibile nella fase 2</p>
        </div>
      </section>

      <!-- Configuration Tab -->
      <section id="tab-config" class="tab-pane">
        <div class="placeholder">
          <p>Disponibile nella fase 3</p>
        </div>
      </section>

      <!-- History Tab -->
      <section id="tab-history" class="tab-pane">
        <div class="placeholder">
          <p>Disponibile nella fase 4</p>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
